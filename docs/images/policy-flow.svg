<svg width="1120" height="420" viewBox="0 0 1120 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1120" height="420" rx="24" fill="#F7F9FC"/>
  <text x="64" y="72" fill="#14213D" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Policy Lifecycle</text>
  <text x="64" y="102" fill="#5E6B82" font-family="Arial, Helvetica, sans-serif" font-size="15">From draft creation to activation, document generation and client delivery</text>

