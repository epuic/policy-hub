  <text x="106" y="232" fill="#5E6B82" font-family="Arial, Helvetica, sans-serif" font-size="13">Client, building, broker</text>

  <rect x="322" y="170" width="210" height="92" rx="14" fill="#EEF4FF" stroke="#BFD2F3"/>
  <text x="358" y="207" fill="#1E3A72" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Premium Engine</text>
  <text x="358" y="232" fill="#51627B" font-family="Arial, Helvetica, sans-serif" font-size="13">Fees and risk factors</text>

