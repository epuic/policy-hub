  <rect x="856" y="246" width="196" height="74" rx="14" fill="#F8F1FF" stroke="#D7BFF4"/>
  <text x="897" y="279" fill="#56328A" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Client Email</text>
