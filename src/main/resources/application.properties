spring.application.name=insurance-service

spring.datasource.url=jdbc:postgresql://localhost:5432/insurance_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.datasource.driver-class-name=org.postgresql.Driver

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.endava.insurance.insurance_service.api.controller
springdoc.default-flat-param-object=true

spring.data.web.pageable.one-indexed-parameters=false

# JWT
jwt.secret=insurance-service-secret-key-32-characters-min
jwt.expiration-ms=86400000

# AI clustering
ai.python.command=py
ai.python.script-path=ml/kprototypes_segmentation.py
ai.clustering.max-iterations=50

# Policy delivery
insurance.email.enabled=true
insurance.email.from=bogdanadrian.ciupe@gmail.com
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bogdanadrian.ciupe@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
